<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pixel Clicker - TimeAttack</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg retro-bg"></div>
  <main class="ui">
    <div class="panel retro-panel center-col gap">
      <h2 class="big-text">TimeAttack</h2>
      <p>Selecciona la duración:</p>
      <div class="row gap center">
        <button class="btn big" onclick="startTA(10)">10 seg</button>
        <button class="btn big" onclick="startTA(30)">30 seg</button>
        <button class="btn big" onclick="startTA(60)">60 seg</button>
      </div>
    </div>
  </main>

  <script>
    function startTA(seconds){
      location.href = `timeattack_game.html?duration=${seconds}`;
    }
  </script>
</body>
</html>
