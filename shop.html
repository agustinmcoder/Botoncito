<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pixel Clicker - Tienda</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ui">
    <div class="panel">
      <div class="topbar">
        <h1>Tienda</h1>
        <div class="stats">
          <div class="stat">Diamantes: <span id="diamonds">0</span></div>
          <button class="btn small" onclick="location.href='index.html'">Menú</button>
          <button class="btn small alt" onclick="location.href='inventory.html'">Inventario</button>
          <button class="btn small" onclick="location.href='game.html'">Volver al juego</button>
        </div>
      </div>

      <div id="shopList" class="shop-grid" aria-live="polite"></div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="common.js"></script>
  <script>
    function getItemsLocal(){ try { return JSON.parse(localStorage.getItem('shop_items') || '[]'); } catch(e){ return []; } }

    const shopListEl = document.getElementById('shopList');
    const diamondsEl = document.getElementById('diamonds');

    function renderShop(){
      const items = getItemsLocal();
      const state = loadState() || {};
      const diamonds = state.diamonds || 0;
      diamondsEl.textContent = diamonds;
      shopListEl.innerHTML = '';
      items.forEach(item => {
        const itemEl = document.createElement('div');
        itemEl.className = 'shop-item';
        itemEl.innerHTML = `
          <img class="item-thumb" src="${item.thumb}" alt="${item.name}">
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-desc">${item.desc || ''}</div>
            <div class="item-row">
              <div class="item-price">${item.price} ♦</div>
              <div>
                <button class="btn buy-btn" data-item-id="${item.id}">Comprar</button>
              </div>
            </div>
          </div>
        `;
        const btn = itemEl.querySelector('.buy-btn');
        if (diamonds < item.price) btn.disabled = true;
        shopListEl.appendChild(itemEl);
      });
    }

    shopListEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.buy-btn');
      if (!btn) return;
      buyItem(btn.dataset.itemId);
      renderShop();
    });

    initItemsIfMissing();
    initEconomyIfMissing();
    initStateIfMissing();
    renderShop();
  </script>
</body>
</html>
