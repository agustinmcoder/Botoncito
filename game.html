<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pixel Clicker - Juego</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="left-actions">
      <button id="resetBtn" class="btn small">Reiniciar clicks</button>
    </div>
    <div class="brand">Pixel Clicker</div>
    <nav>
      <a class="btn small" href="index.html">Menú</a>
      <a class="btn small" href="shop.html">Tienda</a>
      <a class="btn small" href="inventory.html">Inventario</a>
    </nav>
  </header>

  <main class="ui">
    <div class="panel no-fill">
      <div class="row center">
        <div id="counter" class="big-text">0</div>
      </div>

      <div class="center-button">
        <button id="redBtn" class="red-btn" aria-label="Botón rojo"></button>
      </div>

      <div class="row center gap" style="margin-top:8px">
        <div class="stat">Diamantes: <span id="diamonds">0</span></div>
        <div class="stat">Clicks: <span id="clicks">0</span></div>
      </div>
    </div>
  </main>

  <!-- Confirm modal -->
  <div id="confirmModal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="big-text">Confirmar reinicio</div>
      <div style="font-weight:700;margin-top:8px">¿Estás seguro que querés reiniciar los clicks?</div>
      <div class="modal-actions">
        <button id="confirmYes" class="btn">Sí</button>
        <button id="confirmNo" class="btn alt">No</button>
      </div>
    </div>
  </div>

  <!-- Audio para clicks (usado por applyActiveEffects) -->
  <audio id="clickSound" src="assets/click_default.mp3" preload="auto"></audio>

  <script src="common.js"></script>
  <script>
    const btn = document.getElementById('redBtn');
    const counterEl = document.getElementById('counter');
    const diamondsEl = document.getElementById('diamonds');
    const clicksEl = document.getElementById('clicks');

    const resetBtn = document.getElementById('resetBtn');
    const confirmModal = document.getElementById('confirmModal');
    const confirmYes = document.getElementById('confirmYes');
    const confirmNo = document.getElementById('confirmNo');

    function renderGame(){
      const s = loadState();
      counterEl.textContent = s.clicks || 0;
      diamondsEl.textContent = s.diamonds || 0;
      clicksEl.textContent = s.clicks || 0;
      applyActiveEffects(s);
    }

    // Click handlers
    btn.addEventListener('touchstart', e=>{ e.preventDefault(); handlePress(); });
    btn.addEventListener('click', ()=> handlePress());

    function handlePress(){
      processClick();
      // reproducir sonido si existe
      const audio = document.getElementById('clickSound');
      if (audio) {
        audio.currentTime = 0;
        const p = audio.play();
        if (p && p.catch) p.catch(()=>{});
      }
      animateBtn();
      renderGame();
    }

    function animateBtn(){
      btn.classList.add('pressed');
      setTimeout(()=>btn.classList.remove('pressed'),120);
    }

    // Reiniciar clicks
    resetBtn.addEventListener('click', ()=> confirmModal.classList.remove('hidden'));
    confirmNo.addEventListener('click', ()=> confirmModal.classList.add('hidden'));
    confirmYes.addEventListener('click', ()=>{
      const s = loadState() || {};
      s.clicks = 0;
      saveState(s);
      renderGame();
      confirmModal.classList.add('hidden');
      showToast('Clicks reiniciados');
    });
    confirmModal.addEventListener('click', e=> { if (e.target === confirmModal) confirmModal.classList.add('hidden'); });

    // Animación táctil accesible
    btn.addEventListener('mousedown', ()=> animateBtn());
    btn.addEventListener('touchstart', e=>{ e.preventDefault(); animateBtn(); }, {passive:false});
    btn.addEventListener('keydown', e=> { if (e.code==='Space' || e.code==='Enter') animateBtn(); });

    // Init
    initEconomyIfMissing();
    initStateIfMissing();
    initItemsIfMissing();
    // aplicar efectos activos al cargar
    applyActiveEffects(loadState());
    renderGame();
  </script>
</body>
</html>
