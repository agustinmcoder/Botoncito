<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pixel Clicker - TimeAttack Juego</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .center-col{display:flex;flex-direction:column;align-items:center;justify-content:center}
    .gap{gap:12px}
    .hidden{display:none}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:50}
    .modal-card{background:linear-gradient(180deg,#f8f6f0,#efe9d8);padding:18px;border:4px solid #111;max-width:420px;text-align:center;box-shadow:8px 8px 0 rgba(0,0,0,0.6)}
    .modal-card .big-text{margin-bottom:12px}
    .modal-actions{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
    .btn.big{font-size:1.1rem;padding:12px 18px}
    .panel .center-button { display:flex; justify-content:center; width:100%; margin: 8px 0; }
    /* Asegurar que el timer muestre la duración inicial */
    #timer { min-width: 90px; text-align:center; }
  </style>
</head>
<body>
  <div class="bg retro-bg"></div>
  <main class="ui">
    <div class="panel retro-panel center-col gap">
      <h2 id="timer" class="big-text">00:00</h2>

      <!-- Botón centrado dentro del panel -->
      <div class="center-button">
        <button id="redBtn" class="red-btn retro-btn">Click!</button>
      </div>

      <!-- No mostramos el contador de clicks durante la partida -->
      <div id="result" class="big-text hidden" aria-live="polite"></div>

      <div class="row gap" style="margin-top:12px">
        <button id="backBtn" class="btn small hidden" onclick="location.href='timeattack.html'">Volver</button>
        <button class="btn small" onclick="location.href='index.html'">Menú</button>
      </div>
    </div>
  </main>

  <!-- Modal de resultado (inicialmente oculto) -->
  <div id="resultModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div id="modalTitle" class="big-text">Resultado</div>
      <div id="modalMessage" style="font-weight:700;margin-bottom:8px"></div>
      <div class="modal-actions">
        <button id="retryBtn" class="btn">Jugar otra vez</button>
        <button id="toSelectorBtn" class="btn alt">Volver a TimeAttack</button>
        <button id="toMenuBtn" class="btn small">Menú</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const duration = parseInt(params.get('duration') || '10', 10);
    const btn = document.getElementById('redBtn');
    const timerEl = document.getElementById('timer');
    const resultEl = document.getElementById('result');
    const backBtn = document.getElementById('backBtn');

    const resultModal = document.getElementById('resultModal');
    const modalMessage = document.getElementById('modalMessage');
    const retryBtn = document.getElementById('retryBtn');
    const toSelectorBtn = document.getElementById('toSelectorBtn');
    const toMenuBtn = document.getElementById('toMenuBtn');

    let points = 0;
    let timeLeft = duration;
    let interval = null;
    let started = false;

    function formatTime(sec){
      return `00:${String(sec).padStart(2,'0')}`;
    }

    function updateTimer(){
      timerEl.textContent = formatTime(timeLeft);
      if (timeLeft <= 0){
        endGame();
        return;
      }
      timeLeft--;
    }

    function startTimer(){
      if (!started){
        started = true;
        // Mostrar inmediatamente el tiempo actual y luego decrementar cada segundo
        updateTimer();
        interval = setInterval(updateTimer, 1000);
      }
    }

    // El cronómetro no arranca hasta el primer click; contamos clicks internamente sin mostrarlos
    btn.addEventListener('click', () => {
      if (!started) startTimer();
      points++;
    });

    function endGame(){
      if (interval) {
        clearInterval(interval);
        interval = null;
      }
      btn.disabled = true;
      // Mostrar resultado en modal SOLO AQUÍ, después de que terminó el contador
      modalMessage.textContent = `¡Tiempo! Hiciste ${points} clicks en ${duration} segundos.`;
      resultModal.classList.remove('hidden');
      backBtn.classList.remove('hidden');
    }

    // Modal actions
    retryBtn.addEventListener('click', ()=> {
      resultModal.classList.add('hidden');
      resetAndStartAgain();
    });

    toSelectorBtn.addEventListener('click', ()=> {
      location.href = 'timeattack.html';
    });

    toMenuBtn.addEventListener('click', ()=> {
      location.href = 'index.html';
    });

    function resetAndStartAgain(){
      points = 0;
      timeLeft = duration;
      started = false;
      btn.disabled = false;
      resultEl.classList.add('hidden');
      backBtn.classList.add('hidden');
      // dejar el timer en la duración inicial hasta el primer click
      timerEl.textContent = formatTime(duration);
    }

    // Inicializar vista con la duración mostrada y modal oculto
    resetAndStartAgain();
  </script>
</body>
</html>
