<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pixel Clicker - TimeAttack Juego</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="ui">
    <div class="panel no-fill center-col gap">
      <h2 id="timer" class="big-text">00:00</h2>

      <div class="center-button">
        <button id="redBtn" class="red-btn">Click!</button>
      </div>

      <div id="result" class="big-text hidden" aria-live="polite"></div>

      <div class="row gap" style="margin-top:12px">
        <button id="backBtn" class="btn small hidden" onclick="location.href='timeattack.html'">Volver</button>
        <button class="btn small" onclick="location.href='index.html'">Menú</button>
      </div>
    </div>
  </main>

  <div id="resultModal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="big-text">Resultado</div>
      <div id="modalMessage" style="font-weight:700;margin-bottom:8px"></div>
      <div class="modal-actions">
        <button id="retryBtn" class="btn">Jugar otra vez</button>
        <button id="toSelectorBtn" class="btn alt">Volver a TimeAttack</button>
        <button id="toMenuBtn" class="btn small">Menú</button>
      </div>
    </div>
  </div>

  <script src="common.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const duration = parseInt(params.get('duration') || '10', 10);
    const btn = document.getElementById('redBtn');
    const timerEl = document.getElementById('timer');
    const resultModal = document.getElementById('resultModal');
    const modalMessage = document.getElementById('modalMessage');
    const retryBtn = document.getElementById('retryBtn');
    const toSelectorBtn = document.getElementById('toSelectorBtn');
    const toMenuBtn = document.getElementById('toMenuBtn');
    const backBtn = document.getElementById('backBtn');

    let points = 0, timeLeft = duration, interval = null, started = false;

    function formatTime(sec){ return `00:${String(sec).padStart(2,'0')}`; }
    function renderTimer(){ timerEl.textContent = formatTime(timeLeft); }

    function startTimer(){
      if (started) return;
      started = true;
      renderTimer();
      interval = setInterval(()=>{
        timeLeft--;
        if (timeLeft <= 0){
          timerEl.textContent = formatTime(0);
          endGame();
        } else renderTimer();
      },1000);
    }

    btn.addEventListener('click', ()=> {
      if (!started) startTimer();
      points++;
    });

    function endGame(){
      if (interval){ clearInterval(interval); interval = null; }
      btn.disabled = true;
      modalMessage.textContent = `¡Tiempo! Hiciste ${points} clicks en ${duration} segundos.`;
      resultModal.style.display = 'flex';
      backBtn.classList.remove('hidden');
    }

    retryBtn.addEventListener('click', ()=> { resultModal.style.display='none'; resetAndStartAgain(); });
    toSelectorBtn.addEventListener('click', ()=> location.href='timeattack.html');
    toMenuBtn.addEventListener('click', ()=> location.href='index.html');

    function resetAndStartAgain(){
      points = 0; timeLeft = duration; started = false; btn.disabled = false; backBtn.classList.add('hidden'); resultModal.style.display='none'; renderTimer();
    }

    btn.addEventListener('mousedown', ()=> btn.classList.add('pressed'));
    btn.addEventListener('mouseup', ()=> btn.classList.remove('pressed'));
    btn.addEventListener('touchstart', e=>{ e.preventDefault(); btn.classList.add('pressed'); }, {passive:false});
    btn.addEventListener('touchend', ()=> btn.classList.remove('pressed'));

    resetAndStartAgain();
  </script>
</body>
</html>
